services:
  - type: web
    name: shl-recommender
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false           # set this manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: "8000"
    healthCheckPath: /health
    # Free tier: allow up to 2 min cold-start
